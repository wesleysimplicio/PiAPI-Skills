name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  install-smoke:
    name: install smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - name: install
        run: bash install.sh --yes --agents generic
      - name: ensure piapi-cli on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: piapi-cli --help
        run: piapi-cli --help
      - name: piapi-cli models
        run: piapi-cli models
      - name: verify-webhook (matching)
        run: |
          piapi-cli verify-webhook \
            --header-secret "deadbeef" \
            --expected      "deadbeef"
      - name: verify-webhook (mismatch must exit non-zero)
        run: |
          set +e
          piapi-cli verify-webhook \
            --header-secret "wrong" \
            --expected      "deadbeef"
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            echo "expected non-zero exit on mismatch, got 0"
            exit 1
          fi
      - name: uninstall
        run: bash install.sh --yes --uninstall

  pyimport:
    name: import cli
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: install requests
        run: |
          python -m pip install --upgrade pip
          pip install requests
      - name: import-only smoke
        run: |
          python - <<'PY'
          import importlib.util, sys
          spec = importlib.util.spec_from_file_location("piapi_cli", "cli/cli.py")
          mod = importlib.util.module_from_spec(spec)
          sys.modules["piapi_cli"] = mod
          spec.loader.exec_module(mod)
          print("ok")
          PY
